<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 邮件订阅管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container { max-width: 900px; }
    .form-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .form-section {
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }
    .form-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--primary);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea {
      min-height: 150px;
      resize: vertical;
    }
    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    .btn-back {
      padding: 12px 20px;
      background: var(--border);
      color: var(--text);
      border-radius: 6px;
      text-decoration: none;
    }
    .message {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
    .message.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }
    .message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    .subscribers-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .subscriber-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
    }
    .subscriber-item:last-child {
      border-bottom: none;
    }
    .subscriber-email {
      font-weight: 500;
    }
    .subscriber-date {
      color: var(--text-light);
      font-size: 12px;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-item {
      background: var(--light-bg);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      flex: 1;
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="nav-container">
      <div class="nav-left">
        <a href="/admin-newsletter" class="logo" id="header-logo">
          <div class="logo-icon" id="header-logo-icon">SV</div>
          <span class="logo-text" id="header-logo-text"> 管理后台</span>
        </a>
      </div>
      <div class="nav-center">
        <nav>
          <ul>
          <li><a href="/admin-list">产品管理</a></li>
          <li><a href="/admin-orders">订单管理</a></li>
          <li><a href="/admin-installations">安装管理</a></li>
          <li><a href="/admin-activations">激活管理</a></li>
          <li><a href="/admin-newsletter">邮件订阅</a></li>
          <li><a href="/admin-support">技术支持</a></li>
          <li><a href="/admin-faq">FAQ</a></li>
          <li><a href="/admin-carddav">CardDAV</a></li>
          <li class="nav-item"><a href="#" onclick="toggleSubmenu(event, 'logs-submenu')">系统日志 <span class="toggle-icon">+</span></a></li>
          <li class="nav-item">
            <a href="#" onclick="toggleSubmenu(event, 'settings-submenu')">系统设置 <span class="toggle-icon">+</span></a>
          </li>
        </ul>
      </nav>
      </div>
      <div class="nav-right">
        <a href="/logout" class="logout-btn">注销</a>
      </div>
  </header>
  <div class="ribbon-bar"></div>
  <div class="nav-submenu-block" id="logs-submenu">
    <ul>
<li><a href="/admin-log-login">登录日志</a></li>
      <li><a href="/admin-log-operation">操作日志</a></li>
      <li><a href="/admin-log-registration">注册日志</a></li>
      <li><a href="/admin-log-activation">激活日志</a></li>
    </ul>
  </div>
  <div class="nav-submenu-block" id="settings-submenu">
    <ul>
      <li><a href="/admin-settings">网站设置</a></li>
      <li><a href="/admin-dbsettings">数据库</a></li>
      <li><a href="/admin-security">安全</a></li>
      <li><a href="/admin-email">邮件</a></li>
      <li><a href="/admin-ai">AI设置</a></li>
      <li><a href="/admin-api">API</a></li>
    </ul>
  </div>

  <!-- Admin Content -->
  <main class="admin-container">
    <h1 style="font-size: 24px; margin-bottom: 10px;">邮件订阅管理</h1>
    <p style="color: var(--text-light); margin-bottom: 30px;">管理订阅用户列表和发送邮件</p>

    <div class="message" id="message"></div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="subscriber-count">0</div>
        <div class="stat-label">订阅用户</div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-section">
        <h3 class="section-title">订阅用户列表</h3>
        <div class="subscribers-list" id="subscribers-list">
          <div style="padding: 20px; text-align: center; color: var(--text-light);">加载中...</div>
        </div>
      </div>
    </div>

    <div class="form-card">
      <form id="email-form">
        <div class="form-section">
          <h3 class="section-title">发送邮件</h3>

          <div class="form-group">
            <label for="subject">邮件主题</label>
            <input type="text" id="subject" placeholder="输入邮件主题">
          </div>

          <div class="form-group">
            <label for="content">邮件内容</label>
            <textarea id="content" placeholder="输入邮件内容，支持HTML格式"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <a href="/admin-settings" class="btn-back">&larr; 返回</a>
          <button type="submit" class="btn btn-primary">发送邮件</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 加载设置
    async function loadSettings() {
      try {
        const response = await fetch('/api/settings', { credentials: 'include' });
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('header-logo-text').textContent = ' ' + settings.companyName + ' 管理后台';
          document.title = settings.companyName + ' - 邮件订阅管理';
        }

        // 更新头部Logo
        if (settings.logo) {
          document.getElementById('header-logo-icon').outerHTML =
            '<img src="' + settings.logo + '?t=' + Date.now() + '" alt="Logo" id="header-logo-icon" style="height:40px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    // 加载订阅者列表
    async function loadSubscribers() {
      try {
        const response = await fetch('/api/subscribers', { credentials: 'include' });
        const subscribers = await response.json();

        document.getElementById('subscriber-count').textContent = subscribers.length;

        if (subscribers.length === 0) {
          document.getElementById('subscribers-list').innerHTML =
            '<div style="padding: 20px; text-align: center; color: var(--text-light);">暂无订阅用户</div>';
          return;
        }

        document.getElementById('subscribers-list').innerHTML = subscribers.map(s => `
          <div class="subscriber-item">
            <span class="subscriber-email">${escapeHtml(s.email)}</span>
            <span class="subscriber-date">${escapeHtml(new Date(s.created_at).toLocaleDateString())}</span>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading subscribers:', error);
        document.getElementById('subscribers-list').innerHTML =
          '<div style="padding: 20px; text-align: center; color: var(--text-light);">加载失败</div>';
      }
    }

    // 发送邮件
    document.getElementById('email-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const subject = document.getElementById('subject').value;
      const content = document.getElementById('content').value;

      if (!subject || !content) {
        showMessage('请填写邮件主题和内容', 'error');
        return;
      }

      try {
        const response = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject, content }),
          credentials: 'include'
        });
        const data = await response.json();

        if (response.ok) {
          showMessage(data.message, 'success');
          document.getElementById('subject').value = '';
          document.getElementById('content').value = '';
        } else {
          showMessage(data.error || '发送失败', 'error');
        }
      } catch (error) {
        showMessage('发送失败，请稍后重试', 'error');
      }
    });

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      setTimeout(() => { msg.className = 'message'; }, 5000);
    }

    // 初始化
    loadSettings();
    loadSubscribers();

    // 子菜单折叠功能
    function toggleSubmenu(e, submenuId) {
      e.preventDefault();
      if (submenuId) {
      document.querySelectorAll('.nav-submenu-block').forEach(s => s.classList.remove('open'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('open'));
      const submenu = document.getElementById(submenuId);
      const navItem = e.target.closest('.nav-item');
      if (submenu) submenu.classList.add('open');
      if (navItem) navItem.classList.add('open');
      }
    }

    // 高亮当前页面链接
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-submenu-block a').forEach(link => {
      if (link.getAttribute('href') === currentPath) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
