<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 用户登录</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: var(--white);
      border-radius: 12px;
      padding: 50px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo .logo {
      justify-content: center;
    }
    .login-logo h2 {
      margin-top: 15px;
      color: var(--text);
    }
    .login-form {
      margin-top: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(19, 60, 138, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: var(--primary-dark);
    }
    .error-message {
      background: #fef2f2;
      color: #d32f2f;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link a:hover {
      color: var(--primary);
    }
    .register-link {
      text-align: center;
      margin-top: 15px;
      color: var(--text-light);
      font-size: 14px;
    }
    .register-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .logged-in-info {
      text-align: center;
      padding: 30px 0;
    }
    .logged-in-info h3 {
      color: var(--text);
      margin-bottom: 10px;
    }
    .logged-in-info p {
      color: var(--text-light);
      margin-bottom: 20px;
    }
    .logout-btn {
      padding: 12px 30px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .logout-btn:hover {
      background: var(--primary-dark);
    }
    .captcha-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .captcha-container input {
      flex: 1;
    }
    .captcha-img {
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <a href="/" class="logo">
        <div class="logo-icon" id="login-logo-icon">SV</div>
        <span class="logo-text" id="login-logo-text">博铭科技</span>
      </a>
      <h2>用户登录</h2>
    </div>

    <!-- 已登录状态 -->
    <div class="logged-in-info" id="logged-in-info" style="display: none;">
      <h3 id="logged-in-username"></h3>
      <p>您已登录</p>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <!-- 未登录状态 -->
    <div id="login-section">
      <div class="error-message" id="error-message"></div>

      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="username">用户名/邮箱</label>
          <input type="text" id="username" name="username" required placeholder="请输入用户名或邮箱">
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" required placeholder="请输入密码">
        </div>
        <div class="form-group">
          <label for="captcha">验证码</label>
          <div class="captcha-container">
            <input type="text" id="captcha" name="captcha" required placeholder="请输入验证码" maxlength="4">
            <img src="/api/captcha" alt="验证码" class="captcha-img" id="captcha-img" title="点击刷新">
          </div>
        </div>
        <button type="submit" class="login-btn">登 录</button>
      </form>

      <div class="register-link">
        还没有账号？<a href="/user-register">立即注册</a>
      </div>

      <div class="forgot-link" style="text-align: center; margin-top: 15px;">
        <a href="/user-forgot-password" style="color: var(--text-light); font-size: 14px;">忘记密码？</a>
      </div>
    </div>

    <div class="back-link">
      <a href="/">&larr; 返回网站</a>
    </div>
  </div>

  <script>
    async function checkLoginStatus() {
      try {
        const response = await fetch('/api/user/check-auth', { credentials: 'include' });
        const data = await response.json();
        return data;
      } catch (error) {
        return { isUser: false };
      }
    }

    async function logout() {
      try {
        await fetch('/api/user/logout', {
          method: 'POST',
          credentials: 'include'
        });
        window.location.reload();
      } catch (error) {
        console.error('Logout error:', error);
      }
    }

    async function loadLoginSettings() {
      try {
        const response = await fetch('/api/settings');
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('login-logo-text').textContent = settings.companyName;
          document.title = settings.companyName + ' - 用户登录';
        }

        if (settings.logo) {
          document.getElementById('login-logo-icon').outerHTML =
            '<img src="' + settings.logo + '" alt="Logo" id="login-logo-icon" style="height:40px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    async function initPage() {
      // 检查登录状态
      const authData = await checkLoginStatus();

      if (authData.isUser) {
        // 已登录
        document.getElementById('logged-in-info').style.display = 'block';
        document.getElementById('login-section').style.display = 'none';
        if (authData.username) {
          document.getElementById('logged-in-username').textContent = '欢迎，' + authData.username;
        }
      } else {
        // 未登录
        document.getElementById('logged-in-info').style.display = 'none';
        document.getElementById('login-section').style.display = 'block';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const captcha = document.getElementById('captcha').value;
      const errorMessage = document.getElementById('error-message');

      try {
        const response = await fetch('/api/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, captcha }),
          credentials: 'include'
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = '/user-center';
        } else {
          errorMessage.textContent = data.error || '登录失败';
          errorMessage.classList.add('show');
          refreshCaptcha();
        }
      } catch (error) {
        errorMessage.textContent = '网络错误，请稍后重试';
        errorMessage.classList.add('show');
      }
    });

    function refreshCaptcha() {
      document.getElementById('captcha-img').src = '/api/captcha?' + Date.now();
    }

    document.getElementById('captcha-img').addEventListener('click', refreshCaptcha);
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadLoginSettings();
      initPage();
      refreshCaptcha();
    });
  </script>
</body>
</html>
