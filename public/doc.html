<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档 - 博铭科技</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/themes/theme-variables.css">
  <script src="/vendor/dompurify/3.0.6/purify.min.js" defer></script>
  <style>
    body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg, #fafafa); color: var(--text, #1a1a1a); }
    .doc-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .doc-breadcrumb { font-size: 13px; color: var(--text-light, #666); margin-bottom: 16px; }
    .doc-breadcrumb a { color: var(--primary, #0969da); text-decoration: none; }
    .doc-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .doc-meta { color: var(--text-light, #666); font-size: 13px; margin-bottom: 24px; }
    .doc-content { line-height: 1.7; font-size: 16px; }
    .doc-content img { max-width: 100%; height: auto; }
    .doc-content pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow-x: auto; }
    .doc-content code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    .doc-loading { text-align: center; padding: 60px 0; color: #666; }
    .doc-error { text-align: center; padding: 60px 0; color: #cf222e; }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="/" class="logo" id="header-logo">
        <div class="logo-icon" id="header-logo-icon">SV</div>
        <span class="logo-text" id="header-logo-text">博铭科技</span>
      </a>
      <nav>
        <ul>
          <li><a href="/">产品</a></li>
          <li><a href="/#features">特点</a></li>
          <li><a href="/support">支持</a></li>
          <li><a href="/contact">联系</a></li>
          <li><a href="https://blog.booming.one" target="_blank">博客</a></li>
          <li><a href="/about">关于</a></li>
        </ul>
      </nav>
      <div class="header-actions" id="header-actions">
        <button class="header-cart" onclick="renderCartModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h19.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
        </button>
        <a href="/user-login" class="header-login" id="header-login">登录</a>
        <a href="#" class="header-logout" id="header-logout" style="display:none;" onclick="headerLogout()">退出</a>
      </div>
    </div>
  </header>
  <div class="doc-container">
    <div id="doc-content-area">
      <div class="doc-loading">加载中...</div>
    </div>
  </div>

  <script>
    (async function() {
      const parts = window.location.pathname.match(/^\/doc\/([^\/]+)\/([^\/]+)\/?$/);
      if (!parts) {
        document.getElementById('doc-content-area').innerHTML = '<div class="doc-error">无效的文档 URL</div>';
        return;
      }
      const [, productSlug, docSlug] = parts;
      try {
        const res = await fetch(`/api/docs/${encodeURIComponent(productSlug)}/${encodeURIComponent(docSlug)}`);
        if (res.status === 404) {
          document.getElementById('doc-content-area').innerHTML = '<div class="doc-error">文档不存在或尚未发布</div>';
          return;
        }
        if (!res.ok) throw new Error('Fetch failed: ' + res.status);
        const doc = await res.json();
        // Sanitize with DOMPurify to prevent XSS from editor output
        const cleanHtml = window.DOMPurify ? DOMPurify.sanitize(doc.content_html) : doc.content_html;
        const publishedDate = doc.published_at ? new Date(doc.published_at).toLocaleDateString('zh-CN') : '';
        document.getElementById('doc-content-area').innerHTML = `
          <div class="doc-breadcrumb">
            <a href="/">首页</a> / <span>${escapeHtml(productSlug)}</span> / 文档
          </div>
          <h1 class="doc-title">${escapeHtml(doc.title)}</h1>
          <div class="doc-meta">${publishedDate ? '发布于 ' + publishedDate : ''}</div>
          ${doc.excerpt ? `<p style="font-size: 18px; color: #666; margin-bottom: 24px">${escapeHtml(doc.excerpt)}</p>` : ''}
          <div class="doc-content">${cleanHtml}</div>
        `;
        document.title = doc.title + ' - 博铭科技';
      } catch (e) {
        console.error('Doc load error:', e);
        document.getElementById('doc-content-area').innerHTML = '<div class="doc-error">文档加载失败</div>';
      }
    })();
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }
  </script>
  <script src="/js/header-auth.js" defer></script>
  <script src="/js/public-theme.js" defer></script>
</body>
</html>
