<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 忘记密码</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: var(--white);
      border-radius: 12px;
      padding: 50px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo .logo {
      justify-content: center;
    }
    .login-logo h2 {
      margin-top: 15px;
      color: var(--text);
    }
    .login-form {
      margin-top: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(19, 60, 138, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: var(--primary-dark);
    }
    .login-btn:disabled {
      background: var(--text-light);
      cursor: not-allowed;
    }
    .error-message {
      background: #fef2f2;
      color: #d32f2f;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .success-message {
      background: #ecfdf5;
      color: #10b981;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .success-message.show {
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link a:hover {
      color: var(--primary);
    }
    .login-link {
      text-align: center;
      margin-top: 15px;
      color: var(--text-light);
      font-size: 14px;
    }
    .login-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .hint {
      background: #f8f9fa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-light);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <a href="/" class="logo">
        <div class="logo-icon" id="login-logo-icon">SV</div>
        <span class="logo-text" id="login-logo-text">博铭科技</span>
      </a>
      <h2>忘记密码</h2>
    </div>

    <div class="error-message" id="error-message"></div>
    <div class="success-message" id="success-message"></div>

    <div class="hint">
      请输入您注册时使用的邮箱地址，我们将发送临时密码到您的邮箱。
    </div>

    <form class="login-form" id="forgot-form">
      <div class="form-group">
        <label for="email">注册邮箱</label>
        <input type="email" id="email" name="email" required placeholder="请输入注册邮箱">
      </div>
      <button type="submit" class="login-btn" id="submit-btn">发送临时密码</button>
    </form>

    <div class="login-link">
      <a href="/user-login">&larr; 返回登录</a>
    </div>

    <div class="back-link">
      <a href="/">&larr; 返回网站</a>
    </div>
  </div>

  <script>
    async function loadSettings() {
      try {
        const response = await fetch('/api/settings');
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('login-logo-text').textContent = settings.companyName;
          document.title = settings.companyName + ' - 忘记密码';
        }

        if (settings.logo) {
          document.getElementById('login-logo-icon').outerHTML =
            '<img src="' + settings.logo + '" alt="Logo" id="login-logo-icon" style="height:40px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const errorMessage = document.getElementById('error-message');
      const successMessage = document.getElementById('success-message');
      const submitBtn = document.getElementById('submit-btn');

      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      if (!email) {
        errorMessage.textContent = '请输入邮箱地址';
        errorMessage.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '发送中...';

      try {
        const response = await fetch('/api/user/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.ok) {
          successMessage.textContent = '临时密码已发送到您的邮箱，请查收。';
          successMessage.classList.add('show');
          document.getElementById('forgot-form').style.display = 'none';
        } else {
          errorMessage.textContent = data.error || '发送失败，请稍后重试';
          errorMessage.classList.add('show');
        }
      } catch (error) {
        errorMessage.textContent = '网络错误，请稍后重试';
        errorMessage.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '发送临时密码';
      }
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', loadSettings);
  </script>
</body>
</html>
