<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 订单管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container { max-width: 1200px; }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .page-header h1 { font-size: 24px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .number {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
    }
    .stat-card .label {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 5px;
    }
    .form-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
    }
    .orders-table th,
    .orders-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .orders-table th {
      background: #f8f9fa;
      font-weight: 600;
      font-size: 14px;
    }
    .orders-table tr:hover {
      background: #f8f9fa;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-badge.pending { background: #fff3e0; color: #e65100; }
    .status-badge.paid { background: #ecfdf5; color: #10b981; }
    .status-badge.cancelled { background: #fef2f2; color: #d32f2f; }
    .status-badge.archived { background: #f3f4f6; color: #6b7280; }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #e5e7eb;
      color: #374151;
    }
    .tab-btn.active {
      background: var(--primary);
      color: white;
    }
    .tab-btn:hover { opacity: 0.9; }
    .btn-generate {
      padding: 6px 12px;
      background: #10b981;
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-generate:hover { background: #059669; }
    .btn-view {
      padding: 6px 12px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-view:hover { background: var(--primary-dark); }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
    .message.success { background: #ecfdf5; color: #10b981; display: block; }
    .message.error { background: #fef2f2; color: #d32f2f; display: block; }
    .code-display {
      font-size: 24px;
      font-weight: bold;
      color: var(--primary);
      letter-spacing: 4px;
      text-align: center;
      padding: 15px;
      background: #f0f7ff;
      border-radius: 8px;
      margin: 15px 0;
    }
    .copy-btn {
      padding: 8px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .copy-btn:hover { background: #f8f9fa; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--white);
      border-radius: 8px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
    }
    .modal h3 { margin-bottom: 20px; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }
    .order-detail-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-detail-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="nav-left">
        <a href="/admin-product" class="logo">
          <div class="logo-icon" id="header-logo-icon">SV</div>
          <span class="logo-text" id="header-logo-text"> 管理后台</span>
        </a>
      </div>
      <div class="nav-center">
        <nav>
          <ul>
          <li><a href="/admin-list">产品管理</a></li>
          <li><a href="/admin-orders">订单管理</a></li>
          <li><a href="/admin-installations">安装管理</a></li>
          <li><a href="/admin-activations">激活管理</a></li>
          <li><a href="/admin-newsletter">邮件订阅</a></li>
          <li><a href="/admin-support">技术支持</a></li>
          <li><a href="/admin-faq">FAQ</a></li>
          <li><a href="/admin-carddav">CardDAV</a></li>
          <li class="nav-item"><a href="#" onclick="toggleSubmenu(event, 'logs-submenu')">系统日志 <span class="toggle-icon">+</span></a></li>
          <li class="nav-item">
            <a href="#" onclick="toggleSubmenu(event, 'settings-submenu')">系统设置 <span class="toggle-icon">+</span></a>
          </li>
        </ul>
      </nav>
      </div>
      <div class="nav-right">
        <a href="/logout" class="logout-btn">注销</a>
      </div>
  </header>
  <div class="nav-submenu-block" id="logs-submenu">
    <ul>
<li><a href="/admin-log-login">登录日志</a></li>
      <li><a href="/admin-log-operation">操作日志</a></li>
      <li><a href="/admin-log-registration">注册日志</a></li>
      <li><a href="/admin-log-activation">激活日志</a></li>
    </ul>
  </div>
  <div class="nav-submenu-block" id="settings-submenu">
    <ul>
      <li><a href="/admin-settings">网站设置</a></li>
      <li><a href="/admin-dbsettings">数据库</a></li>
      <li><a href="/admin-security">安全</a></li>
      <li><a href="/admin-email">邮件</a></li>
      <li><a href="/admin-ai">AI设置</a></li>
      <li><a href="/admin-api">API</a></li>
    </ul>
  </div>

  <main class="admin-container">
    <div class="page-header">
      <h1>订单管理</h1>
    </div>

    <div class="message" id="message"></div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="number" id="total-orders">0</div>
        <div class="label">总订单</div>
      </div>
      <div class="stat-card">
        <div class="number" id="pending-orders">0</div>
        <div class="label">待支付</div>
      </div>
      <div class="stat-card">
        <div class="number" id="paid-orders">0</div>
        <div class="label">已支付</div>
      </div>
      <div class="stat-card">
        <div class="number" id="total-amount">¥0</div>
        <div class="label">总收入</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('valid')">有效订单</button>
      <button class="tab-btn" onclick="switchTab('archived')">归档订单</button>
    </div>

    <!-- Orders Table -->
    <div class="form-card">
      <table class="orders-table">
        <thead>
          <tr>
            <th>订单号</th>
            <th>用户</th>
            <th>商品</th>
            <th>金额</th>
            <th>状态</th>
            <th>下单时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr><td colspan="7" class="empty-state">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal for Code Generation -->
  <div class="modal" id="code-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h3>生成验证码</h3>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    let orders = [];
    let currentTab = 'valid';

    async function loadSettings() {
      try {
        const response = await fetch('/api/settings', { credentials: 'include' });
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('header-logo-text').textContent = ' ' + settings.companyName + ' 管理后台';
          document.title = settings.companyName + ' - 订单管理';
        }

        if (settings.logo) {
          document.getElementById('header-logo-icon').outerHTML =
            '<img src="' + settings.logo + '?t=' + Date.now() + '" alt="Logo" id="header-logo-icon" style="height:40px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      loadOrders();
    }

    async function loadOrders() {
      try {
        // 获取所有订单（需要管理员权限）
        const url = currentTab === 'archived' ? '/api/orders/all?filter=archived' : '/api/orders/all';
        const response = await fetch(url, { credentials: 'include' });
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }
        orders = await response.json();
        renderStats();
        renderTable();
      } catch (error) {
        console.error('Error loading orders:', error);
        showMessage('加载订单失败', 'error');
      }
    }

    function renderStats() {
      const total = orders.length;
      const pending = orders.filter(o => o.status === 'pending').length;
      const paid = orders.filter(o => o.status === 'paid').length;
      const totalAmount = orders.filter(o => o.status === 'paid').reduce((sum, o) => sum + o.totalAmount, 0);

      document.getElementById('total-orders').textContent = total;
      document.getElementById('pending-orders').textContent = pending;
      document.getElementById('paid-orders').textContent = paid;
      document.getElementById('total-amount').textContent = '¥' + totalAmount.toFixed(0);
    }

    function renderTable() {
      const tbody = document.getElementById('orders-tbody');

      if (!orders || orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无订单</td></tr>';
        return;
      }

      // 按时间倒序
      orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      tbody.innerHTML = orders.map(order => {
        const statusClass = order.status;
        // 显示状态：待支付/已支付/已取消/已激活
        let statusText = order.status === 'paid' ? '已支付' : order.status === 'cancelled' ? '已取消' : '待支付';
        if (order.status === 'paid' && order.isActivated) {
          statusText = '已激活';
        }
        const items = Array.isArray(order.items) ? order.items.map(i => i.name).join(', ') : '-';

        let actionBtn = '';
        if (order.status === 'paid') {
          // 检查是否有激活码
          let hasActivationCodes = false;
          try {
            if (order.activationCodes) {
              try {
                const parsed = JSON.parse(order.activationCodes);
                hasActivationCodes = Array.isArray(parsed) ? parsed.length > 0 : true;
              } catch (e) {
                // 旧数据格式：纯字符串
                hasActivationCodes = true;
              }
            }
          } catch (e) {
            hasActivationCodes = false;
          }
          if (order.isActivated) {
            actionBtn = '<button class="btn-view" onclick="showActivationCodes(' + order.id + ')">查看授权码</button>';
          } else {
            actionBtn = '<button class="btn-view" onclick="showActivationCodes(' + order.id + ')">' + (hasActivationCodes ? '查看授权码' : '生成授权码') + '</button>';
          }
        } else if (order.status === 'pending') {
          actionBtn = '<button class="btn-generate" onclick="generateCode(' + order.id + ')">' + (order.verificationCode ? '重新生成验证码' : '生成验证码') + '</button>';
        }

        return `
          <tr>
            <td>${escapeHtml(order.orderNumber || '#' + order.id)}</td>
            <td>${escapeHtml(order.userName || '用户' + order.userId || '-')}</td>
            <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(items)}</td>
            <td>¥${escapeHtml(order.totalAmount)}</td>
            <td><span class="status-badge ${escapeHtml(statusClass)}">${escapeHtml(statusText)}</span></td>
            <td>${escapeHtml(new Date(order.createdAt).toLocaleString())}</td>
            <td>${actionBtn}</td>
          </tr>
        `;
      }).join('');
    }

    async function generateCode(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      try {
        // 生成新验证码（如果已有则重新生成）
        const response = await fetch('/api/orders/' + orderId + '/generate-code', {
          method: 'POST',
          credentials: 'include'
        });

        if (response.ok) {
          const data = await response.json();
          order.verificationCode = data.code;
          renderTable();
          showCodeModal(order);
        } else {
          showMessage('生成验证码失败', 'error');
        }
      } catch (error) {
        console.error('Error generating code:', error);
        showMessage('生成验证码失败', 'error');
      }
    }

    async function regenerateActivationCodes(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      try {
        const response = await fetch('/api/orders/' + orderId + '/generate-activation-codes', {
          method: 'POST',
          credentials: 'include'
        });

        if (response.ok) {
          const data = await response.json();
          order.activationCodes = JSON.stringify(data.activationCodes);
          renderTable();
          showActivationCodes(orderId);
          showMessage('授权码已重新生成', 'success');
        } else {
          showMessage('生成授权码失败', 'error');
        }
      } catch (error) {
        console.error('Error generating activation codes:', error);
        showMessage('生成授权码失败', 'error');
      }
    }

    function showCodeModal(order) {
      document.getElementById('modal-content').innerHTML = `
        <div class="order-detail-item">
          <span>订单号：</span>
          <span>${escapeHtml(order.orderNumber || '#' + order.id)}</span>
        </div>
        <div class="order-detail-item">
          <span>用户：</span>
          <span>${escapeHtml(order.userName || '-')}</span>
        </div>
        <div class="order-detail-item">
          <span>邮箱：</span>
          <span>${escapeHtml(order.userEmail || '-')}</span>
        </div>
        <div class="order-detail-item">
          <span>商品：</span>
          <span>${escapeHtml(Array.isArray(order.items) ? order.items.map(i => i.name).join(', ') : '-')}</span>
        </div>
        <div class="order-detail-item">
          <span>金额：</span>
          <span>¥${escapeHtml(order.totalAmount)}</span>
        </div>
        <div class="order-detail-item">
          <span>状态：</span>
          <span class="status-badge ${escapeHtml(order.status)}">${escapeHtml(order.status === 'paid' ? '已支付' : order.status === 'cancelled' ? '已取消' : '待支付')}</span>
        </div>
        <div style="margin-top: 20px;">
          <p style="color: var(--text-light); font-size: 14px; margin-bottom: 10px;">验证码（请告知用户）：</p>
          <div class="code-display" id="code-display">${escapeHtml(order.verificationCode || '暂无')}</div>
          <button class="copy-btn" onclick="copyCode()">复制验证码</button>
        </div>
        <p style="margin-top: 15px; color: var(--text-light); font-size: 13px;">
          请将验证码发送给用户，用户在结算页面输入验证码即可完成订单。
        </p>
      `;
      document.getElementById('code-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('code-modal').classList.remove('active');
    }

    function showActivationCodes(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      let activationCodes = [];
      try {
        if (order.activationCodes) {
          try {
            activationCodes = JSON.parse(order.activationCodes);
            if (!Array.isArray(activationCodes)) {
              activationCodes = [activationCodes];
            }
          } catch (e) {
            // 旧数据格式：纯字符串
            activationCodes = [order.activationCodes];
          }
        }
      } catch (e) {
        activationCodes = [];
      }

      let codesHtml = '';
      if (activationCodes.length > 0) {
        codesHtml = activationCodes.map(code => `<div style="margin: 8px 0; padding: 8px; background: #f0f7ff; border-radius: 4px; font-family: monospace; font-size: 14px; letter-spacing: 1px;">${code}</div>`).join('');
      } else {
        codesHtml = '<p style="color: #666;">暂无授权码</p><button class="btn btn-primary" onclick="regenerateActivationCodes(' + order.id + ')" style="margin-top: 10px; padding: 8px 16px; border: none; border-radius: 4px; background: var(--primary); color: white; cursor: pointer;">点击生成授权码</button>';
      }

      document.getElementById('modal-content').innerHTML = `
        <div class="order-detail-item">
          <span>订单号：</span>
          <span>${escapeHtml(order.orderNumber || '#' + order.id)}</span>
        </div>
        <div class="order-detail-item">
          <span>用户：</span>
          <span>${escapeHtml(order.userName || '-')}</span>
        </div>
        <div class="order-detail-item">
          <span>邮箱：</span>
          <span>${escapeHtml(order.userEmail || '-')}</span>
        </div>
        <div class="order-detail-item">
          <span>商品：</span>
          <span>${escapeHtml(Array.isArray(order.items) ? order.items.map(i => i.name).join(', ') : '-')}</span>
        </div>
        <div class="order-detail-item">
          <span>金额：</span>
          <span>¥${escapeHtml(order.totalAmount)}</span>
        </div>
        <div class="order-detail-item">
          <span>状态：</span>
          <span class="status-badge ${escapeHtml(order.status)}">${escapeHtml(order.status === 'paid' ? '已支付' : order.status === 'cancelled' ? '已取消' : '待支付')}</span>
        </div>
        <div style="margin-top: 20px;">
          <p style="color: var(--text-light); font-size: 14px; margin-bottom: 10px;">授权码（共${escapeHtml(activationCodes.length)}组）：</p>
          ${codesHtml}
          <div style="margin-top: 10px; display: flex; gap: 10px;">
            ${activationCodes.length > 0 ? '<button class="copy-btn" onclick="copyAllCodes()">复制全部授权码</button>' : ''}
            ${order.status === 'paid' ? '<button class="btn btn-primary" onclick="regenerateActivationCodes(' + order.id + ')" style="padding: 8px 16px; border: none; border-radius: 4px; background: var(--primary); color: white; cursor: pointer;">重新生成授权码</button>' : ''}
          </div>
        </div>
      `;
      document.getElementById('code-modal').classList.add('active');
    }

    function copyAllCodes() {
      const order = orders.find(o => document.getElementById('modal-content').querySelector('span:nth-child(2)').textContent.startsWith('#'));
      let activationCodes = [];
      try {
        const codesDiv = document.getElementById('modal-content').querySelectorAll('div[style*="font-family: monospace"]');
        activationCodes = Array.from(codesDiv).map(el => el.textContent.trim());
      } catch (e) {
        activationCodes = [];
      }
      const text = activationCodes.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        showMessage('已复制全部授权码', 'success');
      }).catch(() => {
        showMessage('复制失败', 'error');
      });
    }

    function copyCode() {
      const code = document.getElementById('code-display').textContent;
      navigator.clipboard.writeText(code).then(() => {
        showMessage('验证码已复制', 'success');
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = code;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showMessage('验证码已复制', 'success');
      });
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      setTimeout(() => {
        msg.className = 'message';
      }, 4000);
    }

    // 点击模态框外部关闭
    document.getElementById('code-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      loadOrders();
    });

    // 子菜单折叠功能
    function toggleSubmenu(e, submenuId) {
      e.preventDefault();
      if (submenuId) {
      document.querySelectorAll('.nav-submenu-block').forEach(s => s.classList.remove('open'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('open'));
      const submenu = document.getElementById(submenuId);
      const navItem = e.target.closest('.nav-item');
      if (submenu) submenu.classList.add('open');
      if (navItem) navItem.classList.add('open');
      }
    }

    // 高亮当前页面链接
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-submenu-block a').forEach(link => {
      if (link.getAttribute('href') === currentPath) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
