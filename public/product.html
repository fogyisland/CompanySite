<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{product_name} - 博铭科技</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-detail {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .product-header {
      display: flex;
      gap: 40px;
      margin-bottom: 40px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .product-header .product-image {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .product-icon {
      width: 120px;
      height: 120px;
      background: var(--secondary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      flex-shrink: 0;
    }
    .product-info {
      flex: 1;
    }
    .product-info h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: var(--text);
    }
    .product-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .product-meta span {
      background: var(--secondary);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--text-light);
    }
    .product-price {
      font-size: 32px;
      color: var(--primary);
      font-weight: bold;
      margin-bottom: 20px;
    }
    .product-price small {
      font-size: 14px;
      color: var(--text-light);
      font-weight: normal;
    }
    .product-actions {
      display: flex;
      gap: 15px;
    }
    .features-section {
      margin: 30px 0;
      padding: 20px;
      background: var(--secondary);
      border-radius: 8px;
    }
    .features-section h3 {
      margin: 0 0 15px;
      color: var(--primary);
    }
    .features-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: white;
      border-radius: 6px;
    }
    .feature-item span {
      color: var(--success);
      font-weight: bold;
    }
    .pricing-section {
      margin: 30px 0;
      padding: 20px;
      background: #f8f9ff;
      border-radius: 8px;
    }
    .pricing-section h3 {
      margin: 0 0 5px;
      color: var(--primary);
    }
    .pricing-desc {
      color: var(--text-light);
      font-size: 14px;
      margin: 0 0 20px;
    }
    .pricing-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    .pricing-card {
      background: white;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pricing-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(19, 60, 138, 0.15);
    }
    .pricing-card-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .pricing-duration {
      font-weight: bold;
      color: var(--primary);
    }
    .pricing-badge {
      background: #4ade80;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .pricing-card-price {
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 5px;
    }
    .pricing-card-unit {
      font-size: 12px;
      color: var(--text-light);
    }
    .product-content {
      margin-top: 30px;
      line-height: 1.8;
      color: var(--text);
    }
    .product-content h3 {
      color: var(--primary);
      margin-bottom: 15px;
    }
    .product-content h2 {
      font-size: 20px;
      margin: 30px 0 15px;
      color: var(--primary);
    }
    .product-content p {
      margin-bottom: 15px;
    }
    .product-content ul, .product-content ol {
      margin: 15px 0;
      padding-left: 25px;
    }
    .product-content li {
      margin-bottom: 8px;
    }
    .product-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 20px 0;
    }
    .product-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    .product-content th, .product-content td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: left;
    }
    .product-content th {
      background: var(--secondary);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      margin-bottom: 20px;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .features-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--secondary);
      border-radius: 6px;
    }
    .feature-item span {
      color: var(--success);
    }
    .not-found {
      text-align: center;
      padding: 100px 20px;
    }
    .not-found h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: var(--text);
    }
    .loading {
      text-align: center;
      padding: 100px 20px;
      color: var(--text-light);
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="/" class="logo" id="header-logo">
        <div class="logo-icon" id="header-logo-icon">🌍</div>
        <span class="logo-text" id="header-logo-text"> 博铭科技</span>
      </a>
      <nav>
        <ul>
          <li><a href="/">产品</a></li>
          <li><a href="/#features">特点</a></li>
          <li><a href="/support">支持</a></li>
          <li><a href="/contact">联系</a></li>
          <li><a href="https://blog.booming.one" target="_blank">博客</a></li>
          <li><a href="/about">关于</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="header-cart" onclick="renderCartModal()">
          🛒
          <span class="cart-badge" id="cart-badge" style="display: none;">0</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="product-detail" id="product-content">
      <div class="loading">加载中...</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2024 <span id="footer-company">博铭科技</span>. All rights reserved.</p>
    </div>
  </footer>

  <!-- Cart Modal -->
  <div class="modal" id="cart-modal">
    <div class="cart-modal-content">
      <div class="cart-modal-header">
        <h3>购物车</h3>
        <button class="cart-modal-close" onclick="closeCartModal()">&times;</button>
      </div>
      <div id="cart-content" class="cart-modal-body"></div>
    </div>
  </div>

  <script>
    // 获取URL参数
    function getProductIdFromUrl() {
      const path = window.location.pathname;
      const match = path.match(/\/product\/(\d+)/);
      return match ? match[1] : null;
    }

    // 加载产品数据
    async function loadProduct() {
      const productId = getProductIdFromUrl();
      if (!productId) {
        showNotFound();
        return;
      }

      try {
        const response = await fetch('/api/products/' + productId);
        if (!response.ok) {
          showNotFound();
          return;
        }

        const product = await response.json();

        // 如果有详情页文件，获取详情内容
        if (product.detailPage) {
          try {
            const detailResponse = await fetch(product.detailPage);
            if (detailResponse.ok) {
              const detailHtml = await detailResponse.text();
              // 提取body内容
              const parser = new DOMParser();
              const doc = parser.parseFromString(detailHtml, 'text/html');
              const bodyContent = doc.body.innerHTML;
              product.detailContent = bodyContent;
            }
          } catch (e) {
            console.log('No detail content found');
          }
        }

        renderProduct(product);
      } catch (error) {
        console.error('Error loading product:', error);
        showNotFound();
      }
    }

    // 渲染产品详情
    function renderProduct(product) {
      document.title = product.name + ' - 博铭科技';

      const features = product.features || [];
      const featuresHtml = features.length > 0
        ? `<div class="features-section">
            <h3>功能特点</h3>
            <div class="features-list">
              ${features.map(f => `<div class="feature-item"><span>✓</span> ${escapeHtml(f)}</div>`).join('')}
            </div>
           </div>`
        : '';

      const pricingTiers = product.pricingTiers;
      let pricingHtml = '';
      if (pricingTiers && pricingTiers.length > 0) {
        pricingHtml = `<div class="pricing-section">
          <h3>授权方案</h3>
          <p class="pricing-desc">选择适合您的授权时长，到期后可续费续期</p>
          <div class="pricing-cards">
            ${pricingTiers.map(tier => `
              <div class="pricing-card" onclick="selectTier(${product.id}, ${tier.duration}, '${tier.label}', ${tier.price})">
                <div class="pricing-card-header">
                  <span class="pricing-duration">${escapeHtml(tier.label)}</span>
                  <span class="pricing-badge">${tier.duration >= 12 ? '最划算' : ''}</span>
                </div>
                <div class="pricing-card-price">¥${tier.price}</div>
                <div class="pricing-card-unit">${tier.duration}个月授权</div>
              </div>
            `).join('')}
          </div>
        </div>`;
      }

      const content = product.detailContent || product.description || '';
      const contentHtml = content
        ? `<div class="product-content">
            <h3>产品详情</h3>
            ${content}
          </div>`
        : '';

      document.getElementById('product-content').innerHTML = `
        <a href="/" class="back-link">&larr; 返回首页</a>
        <div class="product-header">
          ${product.image ? `<img src="${product.image}" alt="${escapeHtml(product.name)}" class="product-image">` : `<div class="product-icon">${product.icon || '📦'}</div>`}
          <div class="product-info">
            <h1>${escapeHtml(product.name)}</h1>
            <div class="product-meta">
              ${product.category ? `<span>${escapeHtml(product.category)}</span>` : ''}
              ${product.version ? `<span>v${escapeHtml(product.version)}</span>` : ''}
              ${product.platform ? `<span>${escapeHtml(product.platform)}</span>` : ''}
            </div>
            <div class="product-price">
              ¥${(product.pricingTiers && product.pricingTiers.length > 0) ? Math.min(...product.pricingTiers.map(t => t.price)) : product.price}
              <small>/ 起</small>
            </div>
            <div class="product-actions">
              <button class="btn btn-primary" onclick="addProductToCart(${product.id})">立即购买</button>
            </div>
          </div>
        </div>

        ${featuresHtml}
        ${pricingHtml}
        ${contentHtml}
      `;
    }

    function selectTier(productId, duration, label, price) {
      addToCartWithTierIndex(productId, duration, label, price);
    }

    async function addToCartWithTierIndex(productId, duration, label, price) {
      try {
        const response = await fetch('/api/products/' + productId);
        const product = await response.json();
        // 找到对应的tier索引
        const tierIndex = product.pricingTiers.findIndex(t => t.duration === duration);
        addToCart(product, tierIndex, label);
      } catch (error) {
        console.error('Error:', error);
        alert('操作失败');
      }
    }

    function showNotFound() {
      document.getElementById('product-content').innerHTML = `
        <div class="not-found">
          <h2>产品未找到</h2>
          <p>抱歉，您查找的产品不存在或已下架。</p>
          <a href="/" class="btn btn-primary">返回首页</a>
        </div>
      `;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 页面加载完成后获取产品数据
    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      loadProduct();
      updateCartBadge();
    });

    // 加载设置
    async function loadSettings() {
      try {
        const response = await fetch('/api/settings');
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('header-logo-text').textContent = ' ' + settings.companyName;
          document.getElementById('footer-company').textContent = settings.companyName;
        }

        if (settings.logo) {
          const logoIcon = document.getElementById('header-logo-icon');
          logoIcon.outerHTML = '<img src="' + settings.logo + '" alt="Logo" style="height:32px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }
  </script>
  <script src="/js/cart.js"></script>
  <script>
    // Add product to cart (for product detail page)
    async function addProductToCart(productId) {
      try {
        const response = await fetch('/api/products/' + productId);
        const product = await response.json();

        if (product.pricingTiers && product.pricingTiers.length > 0) {
          // Use first tier by default
          const tier = product.pricingTiers[0];
          addToCart(product, 0, tier.label);
        } else {
          addToCart(product, -1, '永久授权');
        }
      } catch (error) {
        console.error('Error adding to cart:', error);
        alert('添加失败，请稍后重试');
      }
    }
  </script>
</body>
</html>
