<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 结算中心</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .checkout-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .checkout-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 32px;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 32px;
    }
    @media (max-width: 768px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }
    .checkout-card {
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.03);
    }
    .checkout-card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      color: var(--text);
    }
    .order-item {
      display: flex;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .order-item:last-child {
      border-bottom: none;
    }
    .order-item-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--white);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      margin-right: 18px;
      box-shadow: 0 4px 12px rgba(19, 60, 138, 0.25);
    }
    .order-item-info {
      flex: 1;
    }
    .order-item-name {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      font-size: 15px;
    }
    .order-item-meta {
      font-size: 13px;
      color: var(--text-light);
    }
    .order-item-price {
      font-size: 20px;
      font-weight: 600;
      color: var(--primary);
    }
    .order-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
      font-size: 20px;
      font-weight: 600;
    }
    .order-total .amount {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    .payment-info {
      background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
      border: 1px solid #ffc107;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .payment-info h4 {
      color: #e65100;
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 600;
    }
    .payment-info p {
      color: #333;
      font-size: 14px;
      line-height: 1.8;
    }
    .wechat-id {
      font-weight: 600;
      color: var(--primary);
      font-size: 16px;
    }
    .verification-form {
      margin-top: 24px;
    }
    .verification-form input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
      transition: all 0.2s;
    }
    .verification-form input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(19, 60, 138, 0.12);
    }
    .btn-wechat {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(7, 193, 96, 0.3);
    }
    .btn-wechat:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(7, 193, 96, 0.4);
    }
    .message {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: none;
      font-size: 14px;
    }
    .message.success {
      background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
      color: #065f46;
      border: 1px solid #a7f3d0;
      display: block;
    }
    .message.error {
      background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
      color: #991b1b;
      border: 1px solid #fecaca;
      display: block;
    }
    .message.info {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      color: #1976d2;
      border: 1px solid #90caf9;
      display: block;
    }
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-light);
    }
    .login-prompt {
      text-align: center;
      padding: 48px;
    }
    .login-prompt h3 {
      margin-bottom: 20px;
      font-size: 20px;
    }
    .login-prompt a {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--white);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(19, 60, 138, 0.3);
    }
    .login-prompt a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(19, 60, 138, 0.4);
    }
    .cart-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      background: linear-gradient(135deg, rgba(19, 60, 138, 0.04) 0%, rgba(19, 60, 138, 0.08) 100%);
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid rgba(19, 60, 138, 0.08);
    }
    .cart-summary-items {
      font-size: 14px;
      color: var(--text-light);
    }
    .cart-summary-total {
      font-size: 22px;
      font-weight: bold;
      color: var(--primary);
    }
    .order-list {
      margin-bottom: 24px;
    }
    .order-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
    }
    .order-card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .order-card-header .order-id {
      font-weight: bold;
      color: var(--text);
    }
    .order-card-header .order-status {
      color: #ff9800;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="/" class="logo">
        <div class="logo-icon" id="header-logo-icon">SV</div>
        <span class="logo-text" id="header-logo-text">博铭科技</span>
      </a>
      <nav>
        <ul>
          <li><a href="/">产品</a></li>
          <li><a href="/#features">特点</a></li>
          <li><a href="/support">支持</a></li>
          <li><a href="/contact">联系</a></li>
          <li><a href="https://blog.booming.one" target="_blank">博客</a></li>
          <li><a href="/about">关于</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="checkout-container" id="checkout-content">
    <!-- Content loaded dynamically -->
  </main>

  <script src="/js/cart.js"></script>
  <script>
    let currentOrders = [];
    let cartItems = [];

    async function loadSiteSettings() {
      try {
        const response = await fetch('/api/settings');
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('header-logo-text').textContent = settings.companyName;
          document.title = settings.companyName + ' - 结算中心';
        }

        if (settings.logo) {
          document.getElementById('header-logo-icon').outerHTML =
            '<img src="' + settings.logo + '" alt="Logo" id="header-logo-icon" style="height:40px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    async function loadCheckout() {
      await loadSiteSettings();
      // 检查用户是否登录
      const authResponse = await fetch('/api/user/check-auth', { credentials: 'include' });
      const authData = await authResponse.json();

      if (!authData.isUser) {
        document.getElementById('checkout-content').innerHTML = `
          <h1 class="checkout-title">结算中心</h1>
          <div class="checkout-card login-prompt">
            <h3>请先登录</h3>
            <p style="margin-bottom: 20px; color: var(--text-light);">您需要登录后才能购买产品</p>
            <a href="/user-login">立即登录</a>
          </div>
        `;
        return;
      }

      // 获取购物车内容
      cartItems = getCart();

      if (cartItems.length === 0) {
        document.getElementById('checkout-content').innerHTML = `
          <h1 class="checkout-title">结算中心</h1>
          <div class="checkout-card">
            <div class="empty-state">
              <h3>购物车为空</h3>
              <p>请选择要购买的产品</p>
              <a href="/" style="color: var(--primary);">返回首页</a>
            </div>
          </div>
        `;
        return;
      }

      // 为每个购物车项创建订单
      currentOrders = [];
      for (const item of cartItems) {
        try {
          const orderResponse = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              items: [{
                productId: item.productId,
                name: item.name,
                price: item.price,
                duration: item.duration,
                tierIndex: item.tierIndex,
                quantity: item.quantity
              }],
              totalAmount: item.price * item.quantity
            }),
            credentials: 'include'
          });
          const order = await orderResponse.json();
          if (order.id) {
            currentOrders.push({ ...order, item });
          }
        } catch (error) {
          console.error('Error creating order:', error);
        }
      }

      // 清空购物车
      clearCart();

      // 渲染结算页面
      renderCheckoutPage();
    }

    function renderCheckoutPage() {
      const totalAmount = currentOrders.reduce((sum, order) => sum + order.totalAmount, 0);

      document.getElementById('checkout-content').innerHTML = `
        <h1 class="checkout-title">结算中心</h1>

        <div class="cart-summary">
          <div class="cart-summary-items">
            共 ${currentOrders.length} 个订单（每个订单将单独结算）
          </div>
          <div class="cart-summary-total">
            合计：¥${totalAmount}
          </div>
        </div>

        <div class="order-list">
          ${currentOrders.map(order => `
            <div class="order-card">
              <div class="order-card-header">
                <span class="order-id">${order.orderNumber || '订单 #' + order.id}</span>
                <span class="order-status">待支付</span>
              </div>
              <div class="order-item">
                <div class="order-item-icon">${order.item.icon || order.item.name.charAt(0)}</div>
                <div class="order-item-info">
                  <div class="order-item-name">${order.item.name}</div>
                  <div class="order-item-meta">${order.item.duration}</div>
                </div>
                <div class="order-item-price">¥${order.item.price * order.item.quantity}</div>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="checkout-grid">
          <div>
            <div class="payment-info">
              <h4>微信支付说明</h4>
              <p>1. 请联系微信号 <span class="wechat-id">xpcustomer</span> 获取付款验证码</p>
              <p>2. 付款时请备注您的用户名以便核实</p>
              <p>3. 验证通过后，系统将自动确认您的订单</p>
            </div>

            <div class="checkout-card">
              <h3>输入验证码</h3>
              <div class="message" id="message"></div>
              <div class="verification-form">
                <input type="text" id="verification-code" placeholder="请输入5位验证码" maxlength="5">
                <button class="btn-wechat" onclick="verifyPayment()">验证支付</button>
              </div>
            </div>
          </div>

          <div>
            <div class="checkout-card">
              <h3>订单信息</h3>
              <div style="margin-bottom: 10px;">
                <span style="color: var(--text-light);">下单时间：</span>
                <span>${new Date().toLocaleString()}</span>
              </div>
              <div>
                <span style="color: var(--text-light);">订单状态：</span>
                <span style="color: #ff9800; font-weight: 600;">待支付</span>
              </div>
            </div>

            <div style="margin-top: 20px;">
              <a href="/" style="display: block; text-align: center; padding: 12px; color: var(--text-light); text-decoration: none;">继续购物</a>
            </div>
          </div>
        </div>
      `;
    }

    async function verifyPayment() {
      const code = document.getElementById('verification-code').value.trim();
      if (!code) {
        showMessage('请输入验证码', 'error');
        return;
      }

      // 验证所有订单
      let verifiedCount = 0;
      let failedCount = 0;

      for (const order of currentOrders) {
        try {
          const response = await fetch('/api/orders/' + order.id + '/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ verificationCode: code }),
            credentials: 'include'
          });

          if (response.ok) {
            verifiedCount++;
          } else {
            failedCount++;
          }
        } catch (error) {
          failedCount++;
        }
      }

      if (verifiedCount > 0) {
        // 清空购物车
        clearCart();
        showMessage(`验证成功！${verifiedCount}个订单已支付！`, 'success');
        setTimeout(() => {
          window.location.href = '/user-center';
        }, 2000);
      } else {
        showMessage('验证码错误', 'error');
      }
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      if (msg) {
        msg.textContent = text;
        msg.className = 'message ' + type;
      }
    }

    document.addEventListener('DOMContentLoaded', loadCheckout);
  </script>
</body>
</html>
