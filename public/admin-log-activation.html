<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 激活日志</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container { max-width: 1200px; }
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th,
    .log-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .log-table th {
      background: var(--light-bg);
      font-weight: 600;
      font-size: 14px;
    }
    .log-table td { font-size: 14px; }
    .log-table tr:hover { background: var(--light-bg); }
    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .status.success { background: #d1fae5; color: #065f46; }
    .status.failed { background: #fee2e2; color: #991b1b; }
    .status.renewal { background: #dbeafe; color: #1e40af; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="nav-container">
      <div class="nav-left">
        <a href="/admin-overview" class="logo" id="header-logo">
          <div class="logo-icon" id="header-logo-icon">SV</div>
          <span class="logo-text" id="header-logo-text"> 管理后台</span>
        </a>
      </div>
      <div class="nav-center">
        <nav>
          <ul>
          <li><a href="/admin-list">产品管理</a></li>
          <li><a href="/admin-orders">订单管理</a></li>
          <li><a href="/admin-installations">安装管理</a></li>
          <li><a href="/admin-activations">激活管理</a></li>
          <li><a href="/admin-newsletter">邮件订阅</a></li>
          <li><a href="/admin-support">技术支持</a></li>
          <li><a href="/admin-faq">FAQ</a></li>
          <li><a href="/admin-carddav">CardDAV</a></li>
          <li class="nav-item">
            <a href="#" onclick="toggleSubmenu(event, 'logs-submenu')">系统日志 <span class="toggle-icon">+</span></a>
          </li>
          <li class="nav-item">
            <a href="#" onclick="toggleSubmenu(event, 'settings-submenu')">系统设置 <span class="toggle-icon">+</span></a>
          </li>
        </ul>
      </nav>
      </div>
      <div class="nav-right">
        <a href="/logout" class="logout-btn">注销</a>
      </div>
  </header>
  <div class="ribbon-bar"></div>
  <div class="nav-submenu-block" id="logs-submenu">
    <ul>
      <li><a href="/admin-log-login">登录日志</a></li>
      <li><a href="/admin-log-operation">操作日志</a></li>
      <li><a href="/admin-log-registration">注册日志</a></li>
      <li><a href="/admin-log-activation">激活日志</a></li>
    </ul>
  </div>
  <div class="nav-submenu-block" id="settings-submenu">
    <ul>
      <li><a href="/admin-settings">网站设置</a></li>
      <li><a href="/admin-dbsettings">数据库</a></li>
      <li><a href="/admin-security">安全</a></li>
      <li><a href="/admin-email">邮件</a></li>
      <li><a href="/admin-ai">AI设置</a></li>
      <li><a href="/admin-api">API</a></li>
    </ul>
  </div>

  <!-- Admin Content -->
  <main class="admin-container">
    <div class="admin-header">
      <h1>激活日志</h1>
      <div class="admin-actions">
        <a href="/admin-overview" class="btn btn-outline btn-small">返回概览</a>
      </div>
    </div>

    <div class="form-card">
      <table class="log-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>MAC地址</th>
            <th>软件名称</th>
            <th>激活码</th>
            <th>状态</th>
            <th>IP</th>
            <th>时间</th>
          </tr>
        </thead>
        <tbody id="logs-table">
          <tr><td colspan="7" style="text-align: center; padding: 40px;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadLogs() {
      try {
        const response = await fetch('/api/logs/activation', { credentials: 'include' });
        const logs = await response.json();

        const tbody = document.getElementById('logs-table');

        if (!logs || logs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">暂无激活记录</td></tr>';
          return;
        }

        tbody.innerHTML = logs.map(log => {
          let statusClass = 'success';
          if (log.status === 'FAILED') statusClass = 'failed';
          else if (log.status === 'RENEWAL') statusClass = 'renewal';

          const keyDisplay = log.activation_key || log.activationKey || '-';
          const maskedKey = keyDisplay.length > 8 ? keyDisplay.substring(0, 4) + '***' + keyDisplay.substring(keyDisplay.length - 4) : keyDisplay;

          return `
            <tr>
              <td>${escapeHtml(String(log.id))}</td>
              <td style="font-family: monospace;">${escapeHtml(log.macAddress || '-')}</td>
              <td>${escapeHtml(log.softwareName || '-')}</td>
              <td style="font-family: monospace;" title="${escapeHtml(keyDisplay)}">${escapeHtml(maskedKey)}</td>
              <td><span class="status ${statusClass}">${escapeHtml(log.status || '-')}</span></td>
              <td>${escapeHtml(log.ip || '-')}</td>
              <td>${escapeHtml(new Date(log.createdAt).toLocaleString())}</td>
            </tr>
          `;
        }).join('');
      } catch (error) {
        console.error('Error loading logs:', error);
        document.getElementById('logs-table').innerHTML =
          '<tr><td colspan="7" style="text-align: center; padding: 40px; color: red;">加载失败</td></tr>';
      }
    }

    function toggleSubmenu(e, submenuId) {
      e.preventDefault();
      if (submenuId) {
      document.querySelectorAll('.nav-submenu-block').forEach(s => s.classList.remove('open'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('open'));
      const submenu = document.getElementById(submenuId);
      const navItem = e.target.closest('.nav-item');
      if (submenu) submenu.classList.add('open');
      if (navItem) navItem.classList.add('open');
      }
    }

    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-submenu-block a').forEach(link => {
      if (link.getAttribute('href') === currentPath) {
        link.classList.add('active');
      }
    });

    // 加载设置
    async function loadSettings() {
      try {
        const response = await fetch('/api/settings', { credentials: 'include' });
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('header-logo-text').textContent = ' ' + settings.companyName + ' 管理后台';
          document.title = settings.companyName + ' - 激活日志';
        }

        if (settings.logo) {
          document.getElementById('header-logo-icon').outerHTML =
            '<img src="' + settings.logo + '?t=' + Date.now() + '" alt="Logo" id="header-logo-icon" style="height:40px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      loadLogs();
    });
  </script>
</body>
</html>
