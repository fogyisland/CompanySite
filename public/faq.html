<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 常见问题</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .faq-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .faq-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .faq-header h1 {
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .faq-header p {
      color: var(--text-light);
      font-size: 17px;
    }
    .faq-list {
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.03);
    }
    .faq-item {
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding-bottom: 24px;
      margin-bottom: 24px;
    }
    .faq-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }
    .faq-question {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: color 0.2s;
    }
    .faq-question:hover {
      color: var(--primary);
    }
    .faq-question::before {
      content: 'Q';
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--white);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      box-shadow: 0 3px 8px rgba(19, 60, 138, 0.25);
    }
    .faq-answer {
      color: var(--text-light);
      line-height: 1.8;
      font-size: 15px;
      padding-left: 40px;
    }
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text-light);
    }
    .contact-box {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--white);
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      margin-top: 48px;
      position: relative;
      overflow: hidden;
    }
    .contact-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, transparent 70%);
    }
    .contact-box > * { position: relative; z-index: 1; }
    .contact-box h3 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .contact-box p {
      margin-bottom: 24px;
      opacity: 0.9;
      font-size: 15px;
    }
    .contact-box a {
      display: inline-block;
      padding: 14px 32px;
      background: var(--white);
      color: var(--primary);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .contact-box a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="/" class="logo">
        <div class="logo-icon" id="header-logo-icon">SV</div>
        <span class="logo-text" id="header-logo-text">博铭科技</span>
      </a>
      <nav>
        <ul>
          <li><a href="/">产品</a></li>
          <li><a href="/#features">特点</a></li>
          <li><a href="/support">支持</a></li>
          <li><a href="/contact">联系</a></li>
          <li><a href="https://blog.booming.one" target="_blank">博客</a></li>
          <li><a href="/about">关于</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="faq-container">
    <div class="faq-header">
      <h1>常见问题</h1>
      <p>解答您最关心的问题</p>
    </div>

    <div class="faq-list" id="faq-list">
      <div class="loading">加载中...</div>
    </div>

    <div class="contact-box">
      <h3>还有其他问题？</h3>
      <p>我们的客服团队随时为您解答</p>
      <a href="mailto:raymond.xu@booming.one">联系客服</a>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <h3 id="footer-brand-name">博铭科技</h3>
          <p id="footer-brand-desc">专业软件商城，为您提供优质软件产品和服务。</p>
        </div>
        <div class="footer-col">
          <h4>快速链接</h4>
          <ul>
            <li><a href="/">产品中心</a></li>
            <li><a href="/help">帮助中心</a></li>
            <li><a href="/docs">文档资料</a></li>
            <li><a href="/faq">常见问题</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>法律信息</h4>
          <ul>
            <li><a href="/privacy">隐私政策</a></li>
            <li><a href="/terms">服务条款</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>联系我们</h4>
          <ul>
            <li>raymond.xu@booming.one</li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 <span id="footer-copyright">博铭科技</span>. 保留所有权利。</p>
      </div>
    </div>
  </footer>

  <script>
    async function loadSettings() {
      try {
        const response = await fetch('/api/settings');
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('header-logo-text').textContent = settings.companyName;
          document.getElementById('footer-brand-name').textContent = settings.companyName;
          document.getElementById('footer-copyright').textContent = settings.companyName;
          document.title = settings.companyName + ' - 常见问题';
        }

        if (settings.logo) {
          document.getElementById('header-logo-icon').outerHTML =
            '<img src="' + settings.logo + '" alt="Logo" id="header-logo-icon" style="height:40px;width:auto;">';
        }

        if (settings.description) {
          document.getElementById('footer-brand-desc').textContent = settings.description;
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    async function loadFaqs() {
      try {
        const response = await fetch('/api/faqs');
        const faqs = await response.json();
        renderFaqs(faqs);
      } catch (error) {
        console.error('Error loading FAQs:', error);
        document.getElementById('faq-list').innerHTML = '<div class="loading">加载失败，请刷新页面</div>';
      }
    }

    function renderFaqs(faqs) {
      const faqList = document.getElementById('faq-list');

      if (!faqs || faqs.length === 0) {
        faqList.innerHTML = '<div class="loading">暂无常见问题</div>';
        return;
      }

      faqList.innerHTML = faqs.map(faq => `
        <div class="faq-item">
          <div class="faq-question">${faq.question}</div>
          <div class="faq-answer">${faq.answer}</div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      loadFaqs();
    });
  </script>
</body>
</html>
