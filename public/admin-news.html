<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动态管理 - 博铭后台</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/pages/admin.css?v=20260622-1700">
  <link rel="stylesheet" href="/css/admin-theme.css?v=20260622-1700">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📢</text></svg>">
  <script src="/js/admin-theme.js" defer></script>
  <link href="/vendor/quill/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="/vendor/quill/1.3.7/quill.min.js" defer></script>
  <style>
    .news-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; padding: 12px; background: var(--admin-bg-card, #fff); border: 1px solid var(--admin-border, #e5e7eb); border-radius: var(--admin-radius, 4px); }
    .news-toolbar select, .news-toolbar input { padding: 6px 12px; border: 1px solid var(--admin-border, #e5e7eb); border-radius: var(--admin-radius, 4px); font-size: var(--admin-font-size-base, 13px); background: var(--admin-bg-card, #fff); color: var(--admin-text-primary, #1a1a1a); }
    .news-list { background: var(--admin-bg-card, #fff); border: 1px solid var(--admin-border, #e5e7eb); border-radius: var(--admin-radius, 4px); }
    .news-list-item { padding: 12px 16px; border-bottom: 1px solid var(--admin-border-light, #f0f0f0); display: flex; align-items: center; gap: 12px; }
    .news-list-item:last-child { border-bottom: none; }
    .news-list-item .news-title-text { flex: 1; font-weight: 500; }
    .news-list-item .news-pinned { color: #f59e0b; }
    .news-status-published { background: #d1fae5; color: #065f46; }
    .news-status-draft { background: #fef3c7; color: #92400e; }
    .news-editor-panel { background: var(--admin-bg-card, #fff); border: 1px solid var(--admin-border, #e5e7eb); border-radius: var(--admin-radius, 4px); padding: 20px; margin-top: 16px; }
    .editor-field { margin-bottom: 14px; }
    .editor-field label { display: block; font-weight: 500; margin-bottom: 6px; color: var(--admin-text-primary, #1a1a1a); }
    .editor-field input, .editor-field textarea, .editor-field select { width: 100%; padding: 8px 12px; border: 1px solid var(--admin-border, #e5e7eb); border-radius: var(--admin-radius, 4px); font-size: var(--admin-font-size-base, 13px); background: var(--admin-bg-card, #fff); color: var(--admin-text-primary, #1a1a1a); box-sizing: border-box; }
    .editor-field #news-editor-container { background: #fff; border-radius: var(--admin-radius, 4px); min-height: 360px; }
    .editor-field #news-editor-container .ql-editor { min-height: 320px; font-size: 15px; line-height: 1.6; }
    .editor-row { display: flex; gap: 12px; align-items: center; }
    .editor-row .editor-field { flex: 1; }
    .admin-btn-primary { padding: 8px 16px; background: var(--admin-primary, #0969da); color: #fff; border: 1px solid var(--admin-primary, #0969da); border-radius: var(--admin-radius, 4px); cursor: pointer; font-size: var(--admin-font-size-base, 13px); }
    .admin-btn-primary:hover { opacity: 0.9; }
    .admin-btn-secondary { padding: 8px 16px; background: var(--admin-bg-card, #fff); color: var(--admin-text-primary, #1a1a1a); border: 1px solid var(--admin-border, #e5e7eb); border-radius: var(--admin-radius, 4px); cursor: pointer; font-size: var(--admin-font-size-base, 13px); }
    .admin-btn-secondary:hover { background: var(--admin-bg-hover, #f6f8fa); }
  </style>
  <link rel="stylesheet" href="/css/admin-sidebar.css?v=20260622-1700">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <h1 style="margin-bottom: 16px">动态管理</h1>

      <div class="news-toolbar">
        <label>分类：
          <select id="category-filter">
            <option value="">全部</option>
            <option value="产品更新">产品更新</option>
            <option value="公司新闻">公司新闻</option>
            <option value="安全公告">安全公告</option>
          </select>
        </label>
        <button class="admin-btn-primary" onclick="createNewNews()">+ 新建动态</button>
        <a id="view-public-link" href="/news.html" target="_blank" style="margin-left: auto; color: var(--admin-primary, #0969da); text-decoration: none;">查看公开动态页 →</a>
      </div>

      <div class="news-list" id="news-list">
        <div style="padding: 20px; text-align: center; color: var(--admin-text-muted, #666);">加载中...</div>
      </div>

      <div class="news-editor-panel" id="editor-panel" style="display: none">
        <h2 id="editor-title" style="margin-top: 0">新建动态</h2>
        <div class="editor-field">
          <label>标题</label>
          <input type="text" id="news-title" placeholder="如：v2.5.0 正式发布">
        </div>
        <div class="editor-field">
          <label>Slug（URL 段，小写字母/数字/连字符）</label>
          <input type="text" id="news-slug" placeholder="如：v2-5-0-release">
        </div>
        <div class="editor-row">
          <div class="editor-field">
            <label>分类</label>
            <select id="news-category">
              <option value="">（无）</option>
              <option value="产品更新">产品更新</option>
              <option value="公司新闻">公司新闻</option>
              <option value="安全公告">安全公告</option>
            </select>
          </div>
          <div class="editor-field">
            <label>排序（数字小靠前）</label>
            <input type="number" id="news-sort-order" value="0">
          </div>
        </div>
        <div class="editor-field">
          <label>摘要（选填，列表展示）</label>
          <textarea id="news-excerpt" rows="2" placeholder="简短描述动态内容"></textarea>
        </div>
        <div class="editor-field">
          <label>封面图 URL（选填）</label>
          <input type="text" id="news-cover-image" placeholder="如：/uploads/docs/cover-2026.png">
        </div>
        <div class="editor-field">
          <label><input type="checkbox" id="news-is-pinned"> 置顶</label>
        </div>
        <div class="editor-field">
          <label>正文</label>
          <div id="news-editor-container"></div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 16px;">
          <button class="admin-btn-primary" onclick="saveNews('draft')">保存草稿</button>
          <button class="admin-btn-secondary" onclick="saveNews('published')">发布</button>
          <button class="admin-btn-secondary" onclick="cancelEdit()" style="margin-left: auto">取消</button>
          <button class="admin-btn-secondary" id="delete-btn" onclick="deleteCurrentNews()" style="display: none; background: #fef2f2; color: #b91c1c; border-color: #b91c1c;">删除</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    let currentNewsId = null;
    let quill = null;

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    function ensureQuillLoaded(cb) {
      if (typeof Quill !== 'undefined') return cb();
      const wait = setInterval(() => {
        if (typeof Quill !== 'undefined') { clearInterval(wait); cb(); }
      }, 50);
      setTimeout(() => { clearInterval(wait); if (typeof Quill === 'undefined') alert('Quill 编辑器加载失败'); }, 5000);
    }

    async function loadNews() {
      const cat = document.getElementById('category-filter').value;
      let url = '/api/admin/news';
      const res = await fetch(url, { credentials: 'include' });
      if (!res.ok) { document.getElementById('news-list').innerHTML = '<div style="padding: 20px; text-align: center; color: #b91c1c;">加载失败</div>'; return; }
      const all = await res.json();
      const filtered = cat ? all.filter(n => n.category === cat) : all;
      const list = document.getElementById('news-list');
      if (filtered.length === 0) {
        list.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">暂无动态</div>';
        return;
      }
      list.innerHTML = filtered.map(n => `
        <div class="news-list-item">
          ${n.is_pinned ? '<span class="news-pinned">📌</span>' : '<span style="width: 24px"></span>'}
          <div class="news-title-text">
            ${escapeHtml(n.title)}
            <span style="color: #666; font-weight: 400; font-size: 12px;">/${escapeHtml(n.slug)}</span>
            ${n.category ? `<span style="background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-left: 8px;">${escapeHtml(n.category)}</span>` : ''}
          </div>
          <span class="news-status-${n.status}" style="padding: 2px 10px; border-radius: 12px; font-size: 12px;">${n.status === 'published' ? '已发布' : '草稿'}</span>
          <span style="color: #666; font-size: 12px;">👁 ${n.view_count || 0}</span>
          <button class="admin-btn-secondary" onclick="editNews(${n.id})">编辑</button>
          ${n.status === 'published' ? `<button class="admin-btn-secondary" onclick="togglePublish(${n.id}, 'unpublish')">撤稿</button>` : `<button class="admin-btn-primary" onclick="togglePublish(${n.id}, 'publish')">发布</button>`}
        </div>
      `).join('');
    }

    document.getElementById('category-filter').onchange = loadNews;

    function createNewNews() {
      currentNewsId = null;
      document.getElementById('editor-title').textContent = '新建动态';
      document.getElementById('news-title').value = '';
      document.getElementById('news-slug').value = '';
      document.getElementById('news-category').value = '';
      document.getElementById('news-excerpt').value = '';
      document.getElementById('news-cover-image').value = '';
      document.getElementById('news-is-pinned').checked = false;
      document.getElementById('news-sort-order').value = '0';
      document.getElementById('delete-btn').style.display = 'none';
      document.getElementById('editor-panel').style.display = 'block';
      initEditor('');
    }

    async function editNews(id) {
      const res = await fetch('/api/admin/news/' + id, { credentials: 'include' });
      if (!res.ok) { alert('加载动态失败'); return; }
      const n = await res.json();
      currentNewsId = id;
      document.getElementById('editor-title').textContent = '编辑动态';
      document.getElementById('news-title').value = n.title || '';
      document.getElementById('news-slug').value = n.slug || '';
      document.getElementById('news-category').value = n.category || '';
      document.getElementById('news-excerpt').value = n.excerpt || '';
      document.getElementById('news-cover-image').value = n.cover_image || '';
      document.getElementById('news-is-pinned').checked = n.is_pinned === 1 || n.is_pinned === true;
      document.getElementById('news-sort-order').value = n.sort_order || 0;
      document.getElementById('delete-btn').style.display = 'inline-block';
      document.getElementById('editor-panel').style.display = 'block';
      initEditor(n.content_html || '');
    }

    function initEditor(initialContent) {
      ensureQuillLoaded(() => {
        const container = document.getElementById('news-editor-container');
        if (!quill) {
          quill = new Quill(container, {
            theme: 'snow',
            modules: {
              toolbar: {
                container: [
                  [{ header: [2, 3, false] }],
                  ['bold', 'italic', 'underline', 'strike'],
                  [{ list: 'ordered' }, { list: 'bullet' }],
                  ['blockquote', 'code-block'],
                  ['link', 'image'],
                  ['clean']
                ],
                handlers: {
                  image: function() {
                    const input = document.createElement('input');
                    input.setAttribute('type', 'file');
                    input.setAttribute('accept', 'image/jpeg,image/png,image/gif,image/webp,image/svg+xml');
                    input.click();
                    input.onchange = async () => {
                      const file = input.files[0];
                      if (!file) return;
                      if (file.size > 5 * 1024 * 1024) { alert('图片大小超过 5MB'); return; }
                      const fd = new FormData();
                      fd.append('file', file);
                      try {
                        const r = await fetch('/api/upload-doc-image', { method: 'POST', body: fd, credentials: 'include' });
                        if (!r.ok) throw new Error('Upload failed: ' + r.status);
                        const j = await r.json();
                        const range = quill.getSelection(true);
                        quill.insertEmbed(range.index, 'image', j.location, 'user');
                      } catch (err) {
                        console.error(err);
                        alert('图片上传失败');
                      }
                    };
                  }
                }
              }
            }
          });
        }
        quill.setText('');
        if (initialContent) {
          quill.clipboard.dangerouslyPasteHTML(initialContent, 'silent');
        }
      });
    }

    async function saveNews(intent) {
      const title = document.getElementById('news-title').value.trim();
      const slug = document.getElementById('news-slug').value.trim();
      const category = document.getElementById('news-category').value;
      const excerpt = document.getElementById('news-excerpt').value.trim();
      const cover_image = document.getElementById('news-cover-image').value.trim();
      const is_pinned = document.getElementById('news-is-pinned').checked;
      const sort_order = parseInt(document.getElementById('news-sort-order').value, 10) || 0;
      const content_html = quill ? quill.root.innerHTML : '';
      if (!title || !slug) { alert('标题和 slug 必填'); return; }
      if (!/^[a-z0-9-]+$/.test(slug)) { alert('slug 仅允许小写字母、数字、连字符'); return; }
      const payload = { title, slug, excerpt, content_html, cover_image, category, is_pinned, sort_order };
      try {
        let newsId = currentNewsId;
        if (newsId) {
          const r = await fetch('/api/admin/news/' + newsId, {
            method: 'PUT', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!r.ok) { const j = await r.json(); alert(j.error || '更新失败'); return; }
        } else {
          const r = await fetch('/api/admin/news', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const j = await r.json();
          if (!r.ok) { alert(j.error || '创建失败'); return; }
          newsId = j.id;
          currentNewsId = newsId;
        }
        if (intent === 'published') {
          await fetch('/api/admin/news/' + newsId + '/publish', { method: 'POST', credentials: 'include' });
        }
        cancelEdit();
        loadNews();
      } catch (e) {
        console.error(e);
        alert('保存失败：' + e.message);
      }
    }

    async function togglePublish(id, action) {
      try {
        await fetch('/api/admin/news/' + id + '/' + action, { method: 'POST', credentials: 'include' });
        loadNews();
      } catch (e) { console.error(e); alert('操作失败'); }
    }

    async function deleteCurrentNews() {
      if (!currentNewsId) return;
      if (!confirm('确定删除？此操作不可恢复。')) return;
      try {
        await fetch('/api/admin/news/' + currentNewsId, { method: 'DELETE', credentials: 'include' });
        cancelEdit();
        loadNews();
      } catch (e) { console.error(e); alert('删除失败'); }
    }

    function cancelEdit() {
      document.getElementById('editor-panel').style.display = 'none';
      if (quill) quill.setText('');
      currentNewsId = null;
    }

    loadNews();
  </script>
  <script src="/js/lucide-icons.js"></script>
  <script src="/js/admin-sidebar.js?v=20260622-2300" defer></script>
</body>
</html>
