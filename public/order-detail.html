<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博铭科技 - 订单详情</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .order-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .order-header h1 {
      font-size: 28px;
    }
    .btn-back {
      padding: 10px 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      text-decoration: none;
    }
    .btn-back:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .order-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .order-section {
      margin-bottom: 25px;
      padding-bottom: 25px;
      border-bottom: 1px solid var(--border);
    }
    .order-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .order-section h3 {
      font-size: 16px;
      color: var(--text-light);
      margin-bottom: 15px;
      font-weight: 500;
    }
    .order-info-row {
      display: flex;
      margin-bottom: 10px;
    }
    .order-info-row:last-child {
      margin-bottom: 0;
    }
    .order-info-label {
      width: 120px;
      color: var(--text-light);
    }
    .order-info-value {
      flex: 1;
      color: var(--text);
      font-weight: 500;
    }
    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .status-badge.pending {
      background: #fff3e0;
      color: #e65100;
    }
    .status-badge.paid {
      background: #ecfdf5;
      color: var(--success);
    }
    .status-badge.cancelled {
      background: #fef2f2;
      color: #d32f2f;
    }
    .product-item {
      display: flex;
      align-items: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .product-item:last-child {
      margin-bottom: 0;
    }
    .product-icon {
      width: 50px;
      height: 50px;
      background: var(--primary);
      color: var(--white);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      margin-right: 15px;
    }
    .product-info {
      flex: 1;
    }
    .product-name {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
    }
    .product-meta {
      font-size: 13px;
      color: var(--text-light);
    }
    .product-price {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
    }
    .total-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 8px;
      color: var(--white);
    }
    .total-label {
      font-size: 18px;
    }
    .total-amount {
      font-size: 32px;
      font-weight: bold;
    }
    .success-banner {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: var(--white);
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
    }
    .success-banner h2 {
      margin-bottom: 10px;
    }
    .success-banner p {
      opacity: 0.9;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state h3 {
      margin-bottom: 10px;
    }
    .empty-state a {
      color: var(--primary);
      text-decoration: none;
    }
    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
    }
    .message.success {
      background: #ecfdf5;
      color: #10b981;
      display: block;
    }
    .message.error {
      background: #fef2f2;
      color: #d32f2f;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="/" class="logo">
        <div class="logo-icon" id="header-logo-icon">SV</div>
        <span class="logo-text" id="header-logo-text">博铭科技</span>
      </a>
      <nav>
        <ul>
          <li><a href="/">产品</a></li>
          <li><a href="/#features">特点</a></li>
          <li><a href="/support">支持</a></li>
          <li><a href="/contact">联系</a></li>
          <li><a href="https://blog.booming.one" target="_blank">博客</a></li>
          <li><a href="/about">关于</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="order-container" id="order-content">
    <!-- Content loaded dynamically -->
  </main>

  <script>
    let currentOrderData = null;

    async function loadSiteSettings() {
      try {
        const response = await fetch('/api/settings');
        const settings = await response.json();

        if (settings.companyName) {
          document.getElementById('header-logo-text').textContent = settings.companyName;
          document.title = settings.companyName + ' - 订单详情';
        }

        if (settings.logo) {
          document.getElementById('header-logo-icon').outerHTML =
            '<img src="' + settings.logo + '" alt="Logo" id="header-logo-icon" style="height:40px;width:auto;">';
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    async function loadOrderDetail() {
      await loadSiteSettings();

      // 检查用户是否登录
      const authResponse = await fetch('/api/user/check-auth', { credentials: 'include' });
      const authData = await authResponse.json();

      if (!authData.isUser) {
        window.location.href = '/user-login';
        return;
      }

      // 获取订单ID
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('id');

      if (!orderId) {
        document.getElementById('order-content').innerHTML = `
          <div class="order-header">
            <h1>订单详情</h1>
          </div>
          <div class="order-card">
            <div class="empty-state">
              <h3>订单不存在</h3>
              <p><a href="/user-center">返回用户中心</a></p>
            </div>
          </div>
        `;
        return;
      }

      try {
        // 获取订单详情（含商品信息）
        const response = await fetch('/api/orders/' + orderId + '/details', {
          credentials: 'include'
        });

        if (!response.ok) {
          throw new Error('订单不存在');
        }

        const data = await response.json();
        const order = data.order;
        const items = data.items;

        // 保存订单数据供验证使用
        currentOrderData = { order, items };

        // 验证订单是否属于当前用户
        if (order.userId !== authData.userId) {
          document.getElementById('order-content').innerHTML = `
            <div class="order-header">
              <h1>订单详情</h1>
              <a href="/user-center" class="btn-back">返回用户中心</a>
            </div>
            <div class="order-card">
              <div class="empty-state">
                <h3>无权访问此订单</h3>
              </div>
            </div>
          `;
          return;
        }

        renderOrderDetail(order, items);
      } catch (error) {
        document.getElementById('order-content').innerHTML = `
          <div class="order-header">
            <h1>订单详情</h1>
            <a href="/user-center" class="btn-back">返回用户中心</a>
          </div>
          <div class="order-card">
            <div class="empty-state">
              <h3>加载失败</h3>
              <p>${error.message}</p>
            </div>
          </div>
        `;
      }
    }

    function renderOrderDetail(order, items) {
      const statusClass = order.status;
      const statusText = order.status === 'paid' ? '已支付' : order.status === 'cancelled' ? '已取消' : '待支付';
      const paidDate = order.paidAt ? new Date(order.paidAt).toLocaleString() : '';

      // 解析激活码
      let activationCodes = [];
      try {
        activationCodes = order.activationCodes ? JSON.parse(order.activationCodes) : [];
      } catch (e) {
        activationCodes = [];
      }

      let successBanner = '';
      let codesBanner = '';
      if (order.status === 'paid') {
        successBanner = `
          <div class="success-banner">
            <h2>支付成功</h2>
            <p>感谢您的购买！您购买的产品已激活。</p>
          </div>
        `;
        if (activationCodes.length > 0) {
          codesBanner = `
            <div style="margin-bottom: 20px; padding: 20px; background: #f0f7ff; border-radius: 8px;">
              <h4 style="margin-bottom: 10px; color: var(--primary);">您的授权码</h4>
              <p style="font-size: 13px; color: #666; margin-bottom: 10px;">每组授权码可供一台设备使用</p>
              ${activationCodes.map(c => `<div style="font-family: monospace; font-size: 16px; letter-spacing: 2px; margin: 8px 0; padding: 8px; background: white; border-radius: 4px;">${c}</div>`).join('')}
            </div>
          `;
        }
      }

      document.getElementById('order-content').innerHTML = `
        <div class="order-header">
          <h1>订单详情</h1>
          <a href="/user-center" class="btn-back">返回用户中心</a>
        </div>

        ${successBanner}
        ${codesBanner}

        <div class="order-card">
          <div class="order-section">
            <h3>订单状态</h3>
            <span class="status-badge ${statusClass}">${statusText}</span>
            ${order.status === 'paid' && paidDate ? `<p style="margin-top: 10px; color: var(--text-light); font-size: 14px;">支付时间：${paidDate}</p>` : ''}
          </div>

          <div class="order-section">
            <h3>订单信息</h3>
            <div class="order-info-row">
              <span class="order-info-label">订单编号</span>
              <span class="order-info-value">${order.orderNumber || '#' + order.id}</span>
            </div>
            <div class="order-info-row">
              <span class="order-info-label">下单时间</span>
              <span class="order-info-value">${new Date(order.createdAt).toLocaleString()}</span>
            </div>
          </div>

          <div class="order-section">
            <h3>商品信息</h3>
            ${items.map(item => `
              <div class="product-item">
                <div class="product-icon">${item.product ? item.product.name.charAt(0) : item.name.charAt(0)}</div>
                <div class="product-info">
                  <div class="product-name">${item.product ? item.product.name : item.name}</div>
                  <div class="product-meta">
                    ${item.product ? (item.product.category + ' | ' + item.product.version) : ''}
                  </div>
                </div>
                <div class="product-price">¥${item.price}</div>
              </div>
            `).join('')}
          </div>

          <div class="order-section">
            <div class="total-section">
              <span class="total-label">实付金额</span>
              <span class="total-amount">¥${order.totalAmount}</span>
            </div>
          </div>

          ${order.status === 'paid' ? `
          <div class="order-section">
            <h3>下载软件</h3>
            <p style="color: var(--text-light); margin-bottom: 15px;">感谢您的购买！以下是您购买产品的下载地址：</p>
            ${items.map(item => {
              const downloadUrl = item.product ? item.product.download_url : '';
              const hasDownload = downloadUrl && downloadUrl.trim() !== '';
              return `
                <div class="product-item" style="background: #f0f7ff; border: 1px solid #d0e0ff;">
                  <div class="product-info">
                    <div class="product-name">${item.product ? item.product.name : item.name}</div>
                    <div class="product-meta">
                      ${item.product ? (item.product.platform || '') : ''}
                      ${item.duration ? ' | ' + item.duration : ''}
                    </div>
                  </div>
                  ${hasDownload
                    ? `<a href="${downloadUrl}" target="_blank" class="btn-download" style="padding: 8px 20px; background: #10b981; color: white; border-radius: 6px; text-decoration: none; font-size: 14px;">立即下载</a>`
                    : `<span style="color: var(--text-light); font-size: 13px;">暂无下载链接</span>`
                  }
                </div>
              `;
            }).join('')}
          </div>
          ` : ''}
        </div>

        ${order.status !== 'paid' ? `
        <div class="order-card">
          <div class="order-section">
            <h3>输入验证码完成支付</h3>
            <p style="color: var(--text-light); margin-bottom: 15px;">请联系微信号 xpcustomer 获取付款验证码</p>
            <div class="message" id="message" style="display: none;"></div>
            <div style="display: flex; gap: 10px;">
              <input type="text" id="verification-code" placeholder="请输入5位验证码" maxlength="5" style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 16px;">
              <button onclick="verifyPayment()" style="padding: 12px 24px; background: #07c160; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer;">验证支付</button>
            </div>
          </div>
        </div>
        <div style="text-align: center; margin-top: 20px;">
          <a href="/" style="color: var(--text-light); text-decoration: none;">继续购物</a>
        </div>
        ` : ''}
      `;
    }

    async function verifyPayment() {
      const code = document.getElementById('verification-code').value.trim();
      if (!code) {
        showMessage('请输入验证码', 'error');
        return;
      }

      try {
        const response = await fetch('/api/orders/' + currentOrderData.order.id + '/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ verificationCode: code }),
          credentials: 'include'
        });

        const data = await response.json();

        if (response.ok) {
          // 显示激活码
          let codesHtml = '';
          if (data.activationCodes && data.activationCodes.length > 0) {
            codesHtml = `
              <div style="margin-top: 20px; padding: 20px; background: #f0f7ff; border-radius: 8px;">
                <h4 style="margin-bottom: 10px; color: var(--primary);">您的授权码</h4>
                <p style="font-size: 13px; color: #666; margin-bottom: 10px;">每组授权码可供一台设备使用</p>
                ${data.activationCodes.map(c => `<div style="font-family: monospace; font-size: 16px; letter-spacing: 2px; margin: 8px 0; padding: 8px; background: white; border-radius: 4px;">${c}</div>`).join('')}
              </div>
            `;
          }

          document.getElementById('message').outerHTML = `
            <div class="message success" style="display: block;">
              <p style="margin-bottom: 10px;">支付验证成功！</p>
              ${codesHtml}
              <p style="font-size: 13px;">页面将自动刷新...</p>
            </div>
          `;
          setTimeout(() => {
            window.location.reload();
          }, 10000);
        } else {
          showMessage(data.error || '验证码错误', 'error');
        }
      } catch (error) {
        showMessage('网络错误，请稍后重试', 'error');
      }
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      if (msg) {
        msg.textContent = text;
        msg.className = 'message ' + type;
      }
    }

    document.addEventListener('DOMContentLoaded', loadOrderDetail);
  </script>
</body>
</html>
